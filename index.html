<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waxify — Album Rater</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAXbNgPYwFtuUX-axEQp0yi98-YY82P1Zk",
    authDomain: "album-rating-111.firebaseapp.com",
    projectId: "album-rating-111",
    storageBucket: "album-rating-111.firebasestorage.app",
    messagingSenderId: "163120328521",
    appId: "1:163120328521:web:12e8b1b79a926746687498",
    measurementId: "G-LCTYZNJZ4L"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();
  function albumsCol(uid)  { return db.collection("users").doc(uid).collection("albums"); }

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#F5A623;--accent-dim:rgba(245,166,35,0.12);--accent-rgb:245,166,35;
  --bg0:#0D0D0F;--bg1:#141416;--bg2:#1C1C22;--bg3:#242430;
  --border:#2a2a35;--border2:#38384a;
  --text:#E8E8F0;--text2:#9090A8;--text3:#5a5a70;
  --amber:#F5A623;--amber-dim:rgba(245,166,35,0.12);
  --blue:#4FC3F7;--red:#FF6B6B;--green:#81C784;--purple:#CE93D8;
  --radius:14px;--radius-sm:8px;
  --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
  --font-scale:1;
  --card-padding:16px;
  --card-gap:10px;
  --grid-gap:20px;
}
html,body{background:#0D0D0F;color:#E8E8F0;font-family:'Inter',sans-serif;min-height:100vh;scroll-behavior:smooth}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;background:none}
input,textarea,select{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#141416}
::-webkit-scrollbar-thumb{background:#38384a;border-radius:3px}
.app{display:flex;min-height:100vh;zoom:var(--font-scale,1)}
.sidebar{width:220px;min-height:100vh;background:#141416;border-right:1px solid #2a2a35;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidebar-logo{padding:24px 20px 16px;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.sidebar-logo span{font-size:22px}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:8px 10px;flex:1}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#9090A8;font-size:14px;font-weight:500;transition:all .15s;text-align:left;width:100%}
.nav-btn:hover{background:#1C1C22;color:#E8E8F0}
.nav-btn.active{background:var(--accent-dim);color:var(--accent)}
.nav-btn .icon{font-size:16px;width:20px;text-align:center}
.sidebar-stats{padding:16px 20px;border-top:1px solid #2a2a35}
.sidebar-stat{font-size:12px;color:#5a5a70;margin-bottom:4px}
.sidebar-stat strong{color:#9090A8}
.main{flex:1;min-width:0}
.topbar{background:#141416;border-bottom:1px solid #2a2a35;padding:14px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;flex:1}
.search-box{display:flex;align-items:center;gap:8px;background:#1C1C22;border:1px solid #2a2a35;border-radius:30px;padding:7px 14px;width:260px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--accent)}
.search-box input{background:none;border:none;outline:none;color:#E8E8F0;font-size:14px;width:100%}
.search-box .search-icon{color:#5a5a70;font-size:15px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:30px;font-size:14px;font-weight:600;transition:all .15s;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#0D0D0F}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:#242430;color:#9090A8}
.btn-ghost:hover{background:#38384a;color:#E8E8F0}
.btn-danger{background:rgba(255,107,107,.15);color:#FF6B6B}
.btn-danger:hover{background:rgba(255,107,107,.25)}
.btn-sm{padding:5px 12px;font-size:12px}
.content{padding:28px}
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.filter-select{background:#1C1C22;border:1px solid #2a2a35;border-radius:30px;color:#E8E8F0;padding:7px 14px;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s}
.filter-select:focus{border-color:var(--accent)}
.filter-chip{padding:6px 14px;border-radius:30px;font-size:13px;font-weight:500;border:1px solid #2a2a35;background:#1C1C22;color:#9090A8;cursor:pointer;transition:all .15s}
.filter-chip.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.album-grid{display:grid;gap:var(--grid-gap,20px)}
.album-card{background:#1C1C22;border:1px solid #2a2a35;border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;position:relative}
.album-card:hover{border-color:#38384a;transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.album-card.compare-selected{border-color:#4FC3F7;box-shadow:0 0 0 2px rgba(79,195,247,.3)}
.compare-check{position:absolute;top:10px;left:10px;z-index:10;width:26px;height:26px;border-radius:50%;background:#141416;border:2px solid #38384a;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.compare-check.checked{background:#4FC3F7;border-color:#4FC3F7;color:#000}
.album-cover{width:100%;aspect-ratio:1;background:#242430;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;overflow:hidden}
.album-cover img{width:100%;height:100%;object-fit:cover}
.album-cover-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg,#242430 0%,#1C1C22 100%)}
.album-rank{position:absolute;top:10px;left:10px;background:rgba(13,13,15,.85);backdrop-filter:blur(6px);border-radius:20px;padding:3px 9px;font-size:12px;font-weight:700;color:var(--accent);font-family:'Space Grotesk',sans-serif}
.tier-badge{position:absolute;top:10px;right:10px;border-radius:8px;padding:3px 10px;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;backdrop-filter:blur(6px)}
.album-card-body{padding:var(--card-padding);display:flex;flex-direction:column;gap:var(--card-gap,10px);flex:1}
.album-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.album-card-info{flex:1;min-width:0}
.album-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#E8E8F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.album-artist{font-size:13px;color:#9090A8;margin-top:2px}
.album-meta{display:flex;gap:8px;flex-wrap:wrap}
.meta-tag{background:#242430;color:#5a5a70;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:500}
.album-fav{font-size:12px;color:#5a5a70;display:flex;align-items:center;gap:5px}
.album-fav strong{color:var(--accent)}
.compare-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;background:#1C1C22;border:1px solid #4FC3F7;border-radius:40px;padding:12px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideUp .3s ease}
.compare-bar-slot{display:flex;align-items:center;gap:8px;min-width:120px}
.compare-bar-cover{width:32px;height:32px;border-radius:6px;background:#242430;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.compare-bar-cover img{width:100%;height:100%;object-fit:cover}
.compare-bar-title{font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-vs{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#5a5a70}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.detail-panel{background:#141416;border:1px solid #38384a;border-radius:20px;width:100%;max-width:800px;overflow:hidden;margin:auto}
.detail-header{display:flex;gap:24px;padding:28px;background:linear-gradient(135deg,#1C1C22 0%,#141416 100%);border-bottom:1px solid #2a2a35}
.detail-cover{width:140px;height:140px;border-radius:12px;flex-shrink:0;background:#242430;display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;position:relative}
.detail-cover img{width:100%;height:100%;object-fit:cover}
.detail-cover-upload{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;cursor:pointer;font-size:24px}
.detail-cover:hover .detail-cover-upload{opacity:1}
.detail-info{flex:1;min-width:0}
.detail-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1.2}
.detail-artist{font-size:16px;color:#9090A8;margin:6px 0}
.detail-badges{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0}
.detail-score-area{display:flex;align-items:center;gap:16px;margin-top:8px}
.score-big{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;color:var(--accent);line-height:1}
.score-suffix{font-size:16px;color:#5a5a70}
.detail-body{padding:24px 28px}
.section-label{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:#5a5a70;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#2a2a35}
.song-list{display:flex;flex-direction:column;gap:4px;margin-bottom:28px}
.song-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;transition:background .15s;border:1px solid transparent}
.song-row:hover{background:#1C1C22}
.song-row.fav-song{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.04)}
.song-num{font-size:12px;color:#5a5a70;width:22px;text-align:right;flex-shrink:0}
.song-title-wrap{flex:1;min-width:0}
.song-title-text{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-note{font-size:11px;color:#5a5a70;margin-top:1px}
.song-fav-star{color:var(--accent);font-size:13px}
.song-rating-display{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;min-width:32px;text-align:center}
.rating-slider-wrap{display:flex;align-items:center;gap:10px;flex:1}
.rating-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:#242430;outline:none;cursor:pointer}
.rating-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .1s}
.rating-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.rating-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.song-editor{background:#1C1C22;border:1px solid var(--accent);border-radius:8px;padding:12px;margin:4px 0;display:flex;flex-direction:column;gap:10px}
.song-editor-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.progress-bar-wrap{width:100%;background:#242430;border-radius:4px;height:4px;margin-top:6px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s ease}
.field-input{background:#242430;border:1px solid #2a2a35;border-radius:8px;color:#E8E8F0;padding:7px 10px;font-size:14px;outline:none;transition:border-color .2s;width:100%}
.field-input:focus{border-color:var(--accent)}
.rating-num-badge{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;min-width:36px;text-align:center;color:var(--accent)}
.review-textarea{background:#242430;border:1px solid #2a2a35;border-radius:8px;color:#E8E8F0;padding:10px 12px;font-size:14px;outline:none;resize:vertical;min-height:90px;width:100%;transition:border-color .2s;line-height:1.6}
.review-textarea:focus{border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#141416;border:1px solid #38384a;border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:32px}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:#9090A8;letter-spacing:.5px;text-transform:uppercase}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid #2a2a35}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:#1C1C22;border:1px solid #2a2a35;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:6px}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:var(--accent)}
.stat-label{font-size:13px;color:#5a5a70}
.tier-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #2a2a35}
.tier-row:last-child{border-bottom:none}
.tier-letter{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;width:30px}
.tier-bar-wrap{flex:1;background:#242430;border-radius:4px;height:8px;overflow:hidden}
.tier-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.tier-count{font-size:13px;color:#9090A8;width:60px;text-align:right}
.ranking-row{display:flex;align-items:center;gap:16px;padding:14px 16px;background:#1C1C22;border:1px solid #2a2a35;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.ranking-row:hover{border-color:#38384a;background:#242430}
.rank-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#5a5a70;width:36px}
.rank-cover{width:52px;height:52px;border-radius:8px;background:#242430;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.rank-cover img{width:100%;height:100%;object-fit:cover}
.rank-info{flex:1;min-width:0}
.rank-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.rank-artist{font-size:13px;color:#9090A8}
.rank-songs{font-size:11px;color:#5a5a70;margin-top:2px}
.artist-card{background:#1C1C22;border:1px solid #2a2a35;border-radius:14px;padding:20px;margin-bottom:12px}
.artist-name{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:12px}
.artist-meta{display:flex;gap:24px;flex-wrap:wrap}
.artist-stat{display:flex;flex-direction:column;gap:2px}
.artist-stat-val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}
.artist-stat-lbl{font-size:11px;color:#5a5a70}
.log-entry{display:flex;gap:14px;padding:14px 16px;background:#1C1C22;border:1px solid #2a2a35;border-radius:8px;margin-bottom:8px;align-items:flex-start}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.log-content{flex:1;min-width:0}
.log-title{font-size:14px;font-weight:600;margin-bottom:3px}
.log-sub{font-size:12px;color:#5a5a70;line-height:1.5}
.log-time{font-size:11px;color:#5a5a70;flex-shrink:0;white-space:nowrap}
.log-diff{display:inline-flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700}
.log-arrow{color:#5a5a70;font-size:11px}
.compare-panel{background:#141416;border:1px solid #38384a;border-radius:20px;width:100%;max-width:900px;overflow:hidden;margin:auto}
.compare-header{padding:24px 28px;background:#1C1C22;border-bottom:1px solid #2a2a35;display:flex;align-items:center;gap:12px}
.compare-col{flex:1;min-width:0}
.compare-album-header{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;padding:20px}
.compare-album-cover{width:100px;height:100px;border-radius:12px;background:#242430;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:40px}
.compare-album-cover img{width:100%;height:100%;object-fit:cover}
.compare-body{padding:0 0 24px}
.compare-row{display:grid;grid-template-columns:1fr 60px 1fr;gap:0;padding:12px 24px;border-bottom:1px solid #2a2a35;align-items:center}
.compare-row:last-child{border-bottom:none}
.compare-row:hover{background:#1C1C22}
.compare-cell-left{text-align:right;font-size:14px}
.compare-cell-mid{text-align:center;font-size:11px;color:#5a5a70;padding:0 8px;font-weight:600;letter-spacing:.5px}
.compare-cell-right{text-align:left;font-size:14px}
.compare-winner{font-weight:700;color:var(--accent)}
.compare-song-row{display:grid;grid-template-columns:1fr auto auto auto 1fr;gap:8px;padding:8px 24px;align-items:center;border-bottom:1px solid #2a2a35}
.compare-song-row:hover{background:#1C1C22}
.compare-song-left{text-align:right;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-song-right{text-align:left;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-song-score{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;min-width:32px;text-align:center}
.empty-state{text-align:center;padding:80px 24px;color:#5a5a70}
.empty-state .big-icon{font-size:64px;margin-bottom:16px}
.empty-state h2{font-family:'Space Grotesk',sans-serif;font-size:22px;color:#9090A8;margin-bottom:8px}
.empty-state p{font-size:14px;max-width:360px;margin:0 auto 24px;line-height:1.6}
.toast{position:fixed;bottom:24px;right:24px;z-index:500;background:#1C1C22;border:1px solid #38384a;border-radius:10px;padding:12px 18px;font-size:14px;color:#E8E8F0;animation:slideUp .3s ease;display:flex;align-items:center;gap:8px}
.undo-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:450;background:#1C1C22;border:1px solid #38384a;border-radius:40px;padding:10px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideUp .3s ease;font-size:14px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-logo .logo-text,.nav-btn .nav-label,.sidebar-stats{display:none}
  .sidebar-logo{justify-content:center;padding:16px 8px}
  .nav-btn{justify-content:center;padding:10px}
  .album-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .detail-header{flex-direction:column;align-items:flex-start}
  .compare-row{grid-template-columns:1fr 40px 1fr}
}
#root{display:flex;flex-direction:column;min-height:100vh}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0D0D0F}
.auth-card{background:#141416;border:1px solid #2a2a35;border-radius:20px;padding:48px 40px;text-align:center;max-width:380px;width:100%}
.auth-logo{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--accent);margin-bottom:8px}
.auth-tagline{font-size:14px;color:#5a5a70;margin-bottom:36px}
.auth-btn-google{display:inline-flex;align-items:center;gap:12px;padding:12px 24px;border-radius:30px;font-size:15px;font-weight:600;background:#fff;color:#1a1a1a;border:none;cursor:pointer;transition:all .15s;width:100%;justify-content:center}
.auth-btn-google:hover{background:#f0f0f0;transform:translateY(-1px)}
.auth-btn-google img{width:20px;height:20px}
.auth-error{color:#FF6B6B;font-size:13px;margin-top:16px}
.auth-loading{color:#5a5a70;font-size:14px;margin-top:12px}
.sync-indicator{font-size:11px;color:#5a5a70;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:#1C1C22}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#81C784;flex-shrink:0}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Settings panel ─────────────────────────────────────────────────── */
.settings-layout{display:grid;grid-template-columns:200px 1fr;gap:0;min-height:calc(100vh - 60px)}
.settings-sidebar{border-right:1px solid #2a2a35;padding:20px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:60px;align-self:start}
.settings-tab{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#9090A8;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.settings-tab:hover{background:#1C1C22;color:#E8E8F0}
.settings-tab.active{background:var(--accent-dim);color:var(--accent)}
.settings-tab .stab-icon{font-size:16px;width:20px;text-align:center}
.settings-body{padding:28px 32px;max-width:680px}
.settings-section{margin-bottom:36px}
.settings-section-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#E8E8F0;margin-bottom:4px}
.settings-section-desc{font-size:13px;color:#5a5a70;margin-bottom:20px;line-height:1.5}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid #2a2a35}
.settings-row:last-child{border-bottom:none}
.settings-row-info{flex:1}
.settings-row-label{font-size:14px;font-weight:500;color:#E8E8F0;margin-bottom:2px}
.settings-row-sub{font-size:12px;color:#5a5a70;line-height:1.5}
.settings-row-control{flex-shrink:0}
/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute;pointer-events:none}
.toggle-track{position:absolute;inset:0;background:#2a2a35;border-radius:12px;transition:background .2s;cursor:pointer}
.toggle input:checked + .toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.toggle input:checked ~ .toggle-thumb{transform:translateX(20px)}
/* Accent color swatches */
.color-swatches{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative}
.color-swatch.active{border-color:#fff;transform:scale(1.15)}
.color-swatch:hover{transform:scale(1.1)}
/* Tier threshold editor */
.tier-threshold-row{display:grid;grid-template-columns:32px 1fr auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #2a2a35}
.tier-threshold-row:last-child{border-bottom:none}
.tier-threshold-letter{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;text-align:center}
.tier-threshold-input{background:#242430;border:1px solid #2a2a35;border-radius:8px;color:#E8E8F0;padding:6px 10px;font-size:14px;outline:none;width:80px;transition:border-color .2s}
.tier-threshold-input:focus{border-color:var(--accent)}
.tier-threshold-desc{font-size:12px;color:#5a5a70}
/* Density preview */
.density-options{display:flex;gap:12px}
.density-option{flex:1;border:1px solid #2a2a35;border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:center;background:#1C1C22}
.density-option.active{border-color:var(--accent);background:var(--accent-dim)}
.density-option-label{font-size:12px;font-weight:600;margin-top:6px;color:#9090A8}
.density-option.active .density-option-label{color:var(--accent)}
.density-preview{display:flex;flex-direction:column;gap:var(--dp-gap,8px);align-items:center}
.density-preview-card{background:#38384a;border-radius:4px;width:100%}
/* Select styled */
.settings-select{background:#242430;border:1px solid #2a2a35;border-radius:8px;color:#E8E8F0;padding:7px 10px;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s}
.settings-select:focus{border-color:var(--accent)}
/* Danger zone */
.danger-zone{border:1px solid rgba(255,107,107,.25);border-radius:12px;padding:20px;background:rgba(255,107,107,.04)}
.danger-zone-title{font-size:13px;font-weight:700;color:#FF6B6B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
/* Font scale preview */
.font-scale-preview{background:#1C1C22;border-radius:8px;padding:12px 14px;border:1px solid #2a2a35;font-size:calc(14px * var(--font-scale));color:#9090A8;line-height:1.6}
/* Settings save bar */
.settings-save-bar{position:sticky;bottom:0;background:rgba(20,20,22,.95);backdrop-filter:blur(8px);border-top:1px solid #2a2a35;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 -32px -28px}
/* Milestone list */
.milestone-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #2a2a35}
.milestone-item:last-child{border-bottom:none}
.milestone-icon{font-size:20px;width:32px;text-align:center}
.milestone-info{flex:1}
.milestone-name{font-size:13px;font-weight:600;color:#E8E8F0}
.milestone-desc{font-size:11px;color:#5a5a70}
/* Card field toggles */
.card-fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Keyboard shortcut badge */
.kbd{display:inline-block;background:#242430;border:1px solid #38384a;border-radius:4px;padding:1px 6px;font-size:11px;color:#9090A8;font-family:monospace;margin-left:6px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Default settings ──────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  // Appearance
  accentColor: "#F5A623",
  cardDensity: "normal",        // compact | normal | comfortable
  fontScale: 1,                 // 0.85 | 1 | 1.15
  scoreRingStyle: "ring",       // ring | badge | text
  animationsEnabled: true,
  // Rating
  ratingStep: 0.1,              // 0.1 | 0.5 | 1
  showTierBadge: true,
  autoSaveOnClose: false,
  // Tiers
  tierThresholds: { S: 9.5, A: 8.5, B: 7.5, C: 6.0, D: 4.0 },
  // Library
  defaultSort: "dateAdded",
  defaultFilter: "all",
  cardColumns: "auto",          // auto | 1 | 2 | 3
  // Card fields visibility
  showYear: true,
  showGenre: true,
  showTrackCount: true,
  showFavSong: true,
  showDateAdded: true,
  showScoreRing: true,
};

function loadSettings() {
  try {
    const saved = localStorage.getItem("waxify_settings");
    if (saved) return { ...DEFAULT_SETTINGS, ...JSON.parse(saved) };
  } catch(e) {}
  return { ...DEFAULT_SETTINGS };
}

function saveSettings(s) {
  try { localStorage.setItem("waxify_settings", JSON.stringify(s)); } catch(e) {}
}

function applySettingsToDOM(s) {
  const root = document.documentElement;
  root.style.setProperty("--accent", s.accentColor);
  // Derive accent-dim from accent color
  const hex = s.accentColor.replace("#","");
  const r = parseInt(hex.substring(0,2),16);
  const g = parseInt(hex.substring(2,4),16);
  const b = parseInt(hex.substring(4,6),16);
  root.style.setProperty("--accent-dim", `rgba(${r},${g},${b},0.12)`);
  root.style.setProperty("--font-scale", s.fontScale);
  const densityPad = { compact: "10px", normal: "16px", comfortable: "22px" };
  const densityCardGap = { compact: "6px", normal: "10px", comfortable: "14px" };
  const densityGridGap = { compact: "12px", normal: "20px", comfortable: "28px" };
  root.style.setProperty("--card-padding", densityPad[s.cardDensity] || "16px");
  root.style.setProperty("--card-gap", densityCardGap[s.cardDensity] || "10px");
  root.style.setProperty("--grid-gap", densityGridGap[s.cardDensity] || "20px");
}

// ── Firebase helpers ──────────────────────────────────────────────────────
function LoginScreen() {
  const [error, setError] = React.useState(null);
  const [busy,  setBusy]  = React.useState(false);
  async function signIn() {
    setBusy(true); setError(null);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch(e) { setError(e.message); setBusy(false); }
  }
  return (
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">🎧 Waxify</div>
        <div className="auth-tagline">Your personal album rating vault</div>
        <button className="auth-btn-google" onClick={signIn} disabled={busy}>
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.3 30.3 0 24 0 14.7 0 6.7 5.4 2.8 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17z"/><path fill="#FBBC05" d="M10.6 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.1-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.2-8.4 2.2-6.2 0-11.6-4.2-13.4-9.9l-8.1 6.1C6.7 42.6 14.7 48 24 48z"/></svg>
          {busy ? "Signing in…" : "Sign in with Google"}
        </button>
        {error && <div className="auth-error">{error}</div>}
        <div className="auth-loading" style={{marginTop:24,fontSize:12}}>Access is restricted to authorised accounts only.</div>
      </div>
    </div>
  );
}

function SyncIndicator({ syncing }) {
  return (
    <div className="sync-indicator">
      <div className={"sync-dot" + (syncing ? " syncing" : "")}/>
      {syncing ? "Saving…" : "Synced"}
    </div>
  );
}

function Root() {
  const [user, setUser] = React.useState(undefined);
  React.useEffect(() => { return auth.onAuthStateChanged(u => setUser(u || null)); }, []);
  if (user === undefined) return <div className="auth-screen"><div style={{color:"#5a5a70",fontSize:14}}>Loading…</div></div>;
  if (!user) return <LoginScreen/>;
  return <App user={user}/>;
}

// ── Utility functions ─────────────────────────────────────────────────────
function getTier(avg, thresholds) {
  const t = thresholds || { S:9.5, A:8.5, B:7.5, C:6.0, D:4.0 };
  if (avg === null || avg === undefined) return null;
  if (avg >= t.S) return { label: "S", color: "#FF6B6B", bg: "rgba(255,107,107,0.15)" };
  if (avg >= t.A) return { label: "A", color: "#F5A623", bg: "rgba(245,166,35,0.15)" };
  if (avg >= t.B) return { label: "B", color: "#4FC3F7", bg: "rgba(79,195,247,0.15)" };
  if (avg >= t.C) return { label: "C", color: "#81C784", bg: "rgba(129,199,132,0.15)" };
  if (avg >= t.D) return { label: "D", color: "#CE93D8", bg: "rgba(206,147,216,0.15)" };
  return { label: "F", color: "#90A4AE", bg: "rgba(144,164,174,0.15)" };
}
function calcAlbumAvg(songs) {
  const rated = songs.filter(s => s.rating !== null && s.rating !== undefined && s.rating !== "");
  if (!rated.length) return null;
  return rated.reduce((sum, s) => sum + Number(s.rating), 0) / rated.length;
}
function getFavSong(songs) {
  const rated = songs.filter(s => s.rating !== null && s.rating !== "");
  if (!rated.length) return null;
  return rated.reduce((best, s) => (Number(s.rating) > Number(best.rating) ? s : best));
}
function getDisplayFav(album) {
  if (album._pickedFavId) { const picked = album.songs.find(s => s.id === album._pickedFavId); if (picked) return picked; }
  return getFavSong(album.songs);
}
function formatDate(iso) { if (!iso) return ""; return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); }
function formatDateTime(iso) { if (!iso) return ""; return new Date(iso).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }); }
function ratingColor(n) {
  if (n === null || n === undefined || n === "") return "#5a5a70";
  const v = Number(n);
  if (v >= 8.5) return "#F5A623";
  if (v >= 7) return "#4FC3F7";
  if (v >= 5) return "#81C784";
  return "#CE93D8";
}

function formatRating(n, format) {
  if (n === null || n === undefined || n === "") return "—";
  const v = Number(n);
  if (format === "whole") return Math.round(v).toString();
  if (format === "stars") {
    const full = Math.round(v / 2);
    return "★".repeat(full) + "☆".repeat(5 - full);
  }
  return v.toFixed(1);
}

function ScoreRing({ score, size = 56, style = "ring", format = "decimal" }) {
  if (style === "badge") {
    const c = score === null ? "#555" : score >= 8.5 ? "#F5A623" : score >= 7 ? "#4FC3F7" : score >= 5 ? "#81C784" : "#CE93D8";
    return (
      <div style={{width:size,height:size,borderRadius:8,background:score===null?"#1C1C22":`${c}22`,border:`1px solid ${score===null?"#333":c}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:size<50?11:14,fontWeight:700,color:score===null?"#555":c}}>
          {score===null?"—":formatRating(score,format)}
        </span>
      </div>
    );
  }
  if (style === "text") {
    const c = score === null ? "#555" : score >= 8.5 ? "#F5A623" : score >= 7 ? "#4FC3F7" : score >= 5 ? "#81C784" : "#CE93D8";
    return (
      <div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:size<50?16:22,fontWeight:700,color:c}}>
          {score===null?"—":formatRating(score,format)}
        </span>
      </div>
    );
  }
  // default: ring
  const r = (size - 8) / 2;
  const circ = 2 * Math.PI * r;
  const pct = score !== null ? score / 10 : 0;
  const c = score === null ? "#333" : score >= 8.5 ? "#F5A623" : score >= 7 ? "#4FC3F7" : score >= 5 ? "#81C784" : "#CE93D8";
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e24" strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={5}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.6s ease,stroke 0.4s"}}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
        style={{fill:score===null?"#555":c, fontSize:size<50?11:13, fontWeight:700,
          fontFamily:"Space Grotesk,sans-serif", transform:`rotate(90deg)`,
          transformOrigin:`${size/2}px ${size/2}px`}}>
        {score===null?"—":formatRating(score,format)}
      </text>
    </svg>
  );
}

const EMPTY_SONG = () => ({ id: crypto.randomUUID(), title: "", rating: null, note: "" });
const EMPTY_ALBUM = () => ({
  id: crypto.randomUUID(), title: "", artist: "", year: "", genre: "",
  cover: null, songs: [EMPTY_SONG()], review: "", dateAdded: new Date().toISOString(),
});

// ── Main App ──────────────────────────────────────────────────────────────
function App({ user }) {
  const [albums, setAlbums] = useState([]);
  const [log,    setLog]    = useState([]);
  const [view, setView] = useState("library");
  const [search, setSearch] = useState("");
  const [filterTier, setFilterTier] = useState("all");
  const [sortBy, setSortBy] = useState("dateAdded");
  const [selectedAlbum, setSelectedAlbum] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingAlbum, setEditingAlbum] = useState(null);
  const [compareIds, setCompareIds] = useState([]);
  const [showCompare, setShowCompare] = useState(false);
  const [toast, setToast] = useState(null);
  const [undoData, setUndoData] = useState(null);
  const [compareMode, setCompareMode] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [dataLoaded, setDataLoaded] = useState(false);
  const [settings, setSettings] = useState(() => {
    const s = loadSettings();
    applySettingsToDOM(s);
    return s;
  });

  const pendingAlbumWrites = useRef({});
  const pendingLogWrites   = useRef({});
  const pendingLogClears   = useRef(false);

  useEffect(() => {
    async function load() {
      try {
        const [newAlbumsSnap, newLogSnap] = await Promise.all([
          albumsCol(user.uid).orderBy("dateAdded", "asc").get().catch(() => null),
          logCol(user.uid).orderBy("ts", "desc").limit(500).get().catch(() => null),
        ]);
        let loadedAlbums = [], loadedLog = [];
        if (newAlbumsSnap && !newAlbumsSnap.empty) {
          loadedAlbums = newAlbumsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        } else {
          const [legacyAlbumsSnap] = await Promise.all([legacyDoc(user.uid, "albums").get().catch(() => null)]);
          if (legacyAlbumsSnap && legacyAlbumsSnap.exists) {
            loadedAlbums = legacyAlbumsSnap.data().list || [];
            if (loadedAlbums.length > 0) {
              const BATCH_SIZE = 400;
              for (let i = 0; i < loadedAlbums.length; i += BATCH_SIZE) {
                const batch = db.batch();
                loadedAlbums.slice(i, i + BATCH_SIZE).forEach(album => { batch.set(albumsCol(user.uid).doc(album.id), album); });
                await batch.commit();
              }
              await legacyDoc(user.uid, "albums").delete().catch(() => {});
            }
          }
        }
        if (newLogSnap && !newLogSnap.empty) {
          loadedLog = newLogSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        } else {
          const legacyLogSnap = await legacyDoc(user.uid, "log").get().catch(() => null);
          if (legacyLogSnap && legacyLogSnap.exists) {
            loadedLog = legacyLogSnap.data().list || [];
            if (loadedLog.length > 0) {
              const BATCH_SIZE = 400;
              for (let i = 0; i < loadedLog.length; i += BATCH_SIZE) {
                const batch = db.batch();
                loadedLog.slice(i, i + BATCH_SIZE).forEach(entry => {
                  const entryId = entry.id || crypto.randomUUID();
                  batch.set(logCol(user.uid).doc(entryId), { ...entry, id: entryId });
                });
                await batch.commit();
              }
              await legacyDoc(user.uid, "log").delete().catch(() => {});
            }
          }
        }
        setAlbums(loadedAlbums); setLog(loadedLog);
      } catch(e) { console.error("Firestore load error", e); }
      setDataLoaded(true);
    }
    load();
  }, [user.uid]);

  const flushTimer = useRef(null);
  function scheduleFlush() {
    clearTimeout(flushTimer.current);
    setSyncing(true);
    flushTimer.current = setTimeout(async () => {
      try {
        const albumEntries = Object.entries(pendingAlbumWrites.current);
        pendingAlbumWrites.current = {};
        if (albumEntries.length > 0) {
          const BATCH_SIZE = 400;
          for (let i = 0; i < albumEntries.length; i += BATCH_SIZE) {
            const batch = db.batch();
            albumEntries.slice(i, i + BATCH_SIZE).forEach(([id, data]) => {
              const ref = albumsCol(user.uid).doc(id);
              if (data === "__DELETE__") batch.delete(ref); else batch.set(ref, data);
            });
            await batch.commit();
          }
        }
        if (pendingLogClears.current) {
          pendingLogClears.current = false; pendingLogWrites.current = {};
          const snap = await logCol(user.uid).get();
          const BATCH_SIZE = 400;
          for (let i = 0; i < snap.docs.length; i += BATCH_SIZE) {
            const batch = db.batch();
            snap.docs.slice(i, i + BATCH_SIZE).forEach(d => batch.delete(d.ref));
            await batch.commit();
          }
        } else {
          const logEntries = Object.entries(pendingLogWrites.current);
          pendingLogWrites.current = {};
          if (logEntries.length > 0) {
            const BATCH_SIZE = 400;
            for (let i = 0; i < logEntries.length; i += BATCH_SIZE) {
              const batch = db.batch();
              logEntries.slice(i, i + BATCH_SIZE).forEach(([id, data]) => { batch.set(logCol(user.uid).doc(id), data); });
              await batch.commit();
            }
          }
        }
      } catch(e) { console.error("Firestore flush error", e); }
      setSyncing(false);
    }, 800);
  }

  const prevAlbumsRef = useRef(null);
  useEffect(() => {
    if (!dataLoaded) return;
    const prev = prevAlbumsRef.current;
    if (prev !== null) {
      const prevMap = Object.fromEntries(prev.map(a => [a.id, a]));
      const currMap = Object.fromEntries(albums.map(a => [a.id, a]));
      albums.forEach(a => { if (JSON.stringify(a) !== JSON.stringify(prevMap[a.id])) pendingAlbumWrites.current[a.id] = a; });
      prev.forEach(a => { if (!currMap[a.id]) pendingAlbumWrites.current[a.id] = "__DELETE__"; });
      scheduleFlush();
    }
    prevAlbumsRef.current = albums;
  }, [albums, dataLoaded]);

  const prevLogRef = useRef(null);
  useEffect(() => {
    if (!dataLoaded) return;
    const prev = prevLogRef.current;
    if (prev !== null) {
      if (log.length === 0 && prev.length > 0) {
        pendingLogClears.current = true; pendingLogWrites.current = {};
      } else {
        const prevIds = new Set(prev.map(e => e.id));
        log.forEach(e => { if (!prevIds.has(e.id)) pendingLogWrites.current[e.id] = e; });
      }
      scheduleFlush();
    }
    prevLogRef.current = log;
  }, [log, dataLoaded]);

  function handleSettingsSave(newSettings) {
    setSettings(newSettings);
    saveSettings(newSettings);
    applySettingsToDOM(newSettings);
    showToast("Settings saved", "⚙️");
    // Apply default sort/filter from settings
    setSortBy(newSettings.defaultSort);
    setFilterTier(newSettings.defaultFilter);
  }

  function addLog(entry) { setLog(prev => [{ ...entry, id: crypto.randomUUID(), ts: new Date().toISOString() }, ...prev]); }
  function showToast(msg, icon = "✓") { setToast({ msg, icon }); setTimeout(() => setToast(null), 2500); }
  function handleSignOut() { auth.signOut(); }
  function saveAlbum(album, logEntries = []) {
    setAlbums(prev => { const idx = prev.findIndex(a => a.id === album.id); if (idx === -1) return [...prev, album]; const next = [...prev]; next[idx] = album; return next; });
    if (selectedAlbum && selectedAlbum.id === album.id) setSelectedAlbum(album);
    logEntries.forEach(e => addLog(e));
    showToast("Saved");
  }
  function deleteAlbum(id) {
    const album = albums.find(a => a.id === id);
    setUndoData({ album, timeout: setTimeout(() => setUndoData(null), 6000) });
    setAlbums(prev => prev.filter(a => a.id !== id));
    setSelectedAlbum(null);
    addLog({ type: "delete", albumTitle: album.title, albumArtist: album.artist });
    showToast("Album deleted", "🗑");
  }
  function undoDelete() {
    if (!undoData) return;
    clearTimeout(undoData.timeout);
    setAlbums(prev => [...prev, undoData.album]);
    setUndoData(null);
    showToast("Restored!", "↩️");
  }
  function handleExport() {
    const blob = new Blob([JSON.stringify({ albums, log }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `waxify-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url); showToast("Exported", "💾");
  }
  function handleImport(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.albums) { setAlbums(data.albums); if (data.log) setLog(data.log); showToast(`Imported ${data.albums.length} albums`, "📂"); }
        else if (Array.isArray(data)) { setAlbums(data); showToast(`Imported ${data.length} albums`, "📂"); }
      } catch { showToast("Invalid file", "✗"); }
    };
    reader.readAsText(file); e.target.value = "";
  }
  function toggleCompare(id) {
    setCompareIds(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 2) return [prev[1], id];
      return [...prev, id];
    });
  }

  const filtered = useMemo(() => {
    let list = albums.map(a => ({ ...a, avg: calcAlbumAvg(a.songs) }));
    if (search) { const q = search.toLowerCase(); list = list.filter(a => a.title.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q) || (a.genre && a.genre.toLowerCase().includes(q))); }
    if (filterTier !== "all") list = list.filter(a => getTier(a.avg, settings.tierThresholds) && getTier(a.avg, settings.tierThresholds).label === filterTier);
    list.sort((a, b) => {
      if (sortBy === "rating") return (b.avg != null ? b.avg : -1) - (a.avg != null ? a.avg : -1);
      if (sortBy === "title") return a.title.localeCompare(b.title);
      if (sortBy === "artist") return a.artist.localeCompare(b.artist);
      if (sortBy === "year") return (b.year || 0) - (a.year || 0);
      return new Date(b.dateAdded) - new Date(a.dateAdded);
    });
    return list;
  }, [albums, search, filterTier, sortBy, settings.tierThresholds]);

  const ranked = useMemo(() => albums.map(a => ({ ...a, avg: calcAlbumAvg(a.songs) })).filter(a => a.avg !== null).sort((a, b) => b.avg - a.avg), [albums]);
  const artistStats = useMemo(() => {
    const map = {};
    albums.forEach(a => {
      if (!a.artist) return;
      if (!map[a.artist]) map[a.artist] = { albums: 0, totalAvg: 0, ratedAlbums: 0, songs: 0, topAlbum: null };
      const avg = calcAlbumAvg(a.songs);
      map[a.artist].albums++; map[a.artist].songs += a.songs.length;
      if (avg !== null) {
        map[a.artist].totalAvg += avg; map[a.artist].ratedAlbums++;
        if (!map[a.artist].topAlbum || avg > calcAlbumAvg(map[a.artist].topAlbum.songs)) map[a.artist].topAlbum = a;
      }
    });
    return Object.entries(map).map(([name, s]) => ({ name, ...s, avgRating: s.ratedAlbums ? s.totalAvg / s.ratedAlbums : null })).sort((a, b) => (b.avgRating != null ? b.avgRating : -1) - (a.avgRating != null ? a.avgRating : -1));
  }, [albums]);
  const globalStats = useMemo(() => {
    const ratedAlbums = albums.filter(a => calcAlbumAvg(a.songs) !== null);
    const allSongs = albums.flatMap(a => a.songs).filter(s => s.rating !== null && s.rating !== "");
    return { total: albums.length, rated: ratedAlbums.length, avgScore: ratedAlbums.length ? ratedAlbums.reduce((s, a) => s + calcAlbumAvg(a.songs), 0) / ratedAlbums.length : null, topAlbum: ranked[0] || null, totalSongs: albums.reduce((s, a) => s + a.songs.length, 0), ratedSongs: allSongs.length };
  }, [albums, ranked]);

  const compareAlbums = compareIds.map(id => albums.find(a => a.id === id)).filter(Boolean);
  const navItems = [
    { id: "library", icon: "🎵", label: "Library" },
    { id: "rankings", icon: "🏆", label: "Rankings" },
    { id: "artists", icon: "🎤", label: "Artists" },
    { id: "stats", icon: "📊", label: "Statistics" },
    { id: "log", icon: "📋", label: "Edit Log" },
    { id: "settings", icon: "⚙️", label: "Settings" },
  ];

  // Grid columns from settings
  const gridStyle = useMemo(() => {
    if (settings.cardColumns === "1") return { gridTemplateColumns: "1fr" };
    if (settings.cardColumns === "2") return { gridTemplateColumns: "repeat(2,1fr)" };
    if (settings.cardColumns === "3") return { gridTemplateColumns: "repeat(3,1fr)" };
    return { gridTemplateColumns: "repeat(auto-fill,minmax(280px,1fr))" };
  }, [settings.cardColumns]);

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo"><span>🎧</span><span className="logo-text">Waxify</span></div>
        <nav className="sidebar-nav">
          {navItems.map(n => (
            <button key={n.id} className={"nav-btn" + (view === n.id ? " active" : "")} onClick={() => setView(n.id)}>
              <span className="icon">{n.icon}</span><span className="nav-label">{n.label}</span>
              {n.id === "log" && log.length > 0 && <span style={{marginLeft:"auto",background:"var(--accent-dim)",color:"var(--accent)",fontSize:10,padding:"1px 6px",borderRadius:10,fontWeight:700}}>{log.length}</span>}
            </button>
          ))}
        </nav>
        <div className="sidebar-stats">
          <div className="sidebar-stat"><strong>{globalStats.total}</strong> albums</div>
          <div className="sidebar-stat"><strong>{globalStats.totalSongs}</strong> songs</div>
          {globalStats.avgScore !== null && <div className="sidebar-stat">Avg: <strong>{globalStats.avgScore.toFixed(2)}</strong></div>}
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">
            {view === "library" && "My Library"}
            {view === "rankings" && "Top Albums"}
            {view === "artists" && "Artists"}
            {view === "stats" && "Statistics"}
            {view === "log" && "Edit Log"}
            {view === "settings" && "Settings"}
          </div>
          {view === "library" && (
            <>
              <div className="search-box">
                <span className="search-icon">🔍</span>
                <input placeholder="Search albums, artists…" value={search} onChange={e => setSearch(e.target.value)} />
              </div>
              <button className={"btn btn-sm " + (compareMode ? "btn-primary" : "btn-ghost")} onClick={() => { setCompareMode(m => !m); setCompareIds([]); }}>
                {compareMode ? "✓ Comparing" : "⚖️ Compare"}
              </button>
              <button className="btn btn-ghost btn-sm" onClick={handleExport}>💾 Export</button>
              <label className="btn btn-ghost btn-sm" style={{cursor:"pointer"}}>📂 Import<input type="file" accept=".json" style={{display:"none"}} onChange={handleImport} /></label>
              <button className="btn btn-primary" onClick={() => setShowAddModal(true)}>＋ Add Album</button>
              <SyncIndicator syncing={syncing}/>
              <button className="btn btn-ghost btn-sm" title={"Signed in as "+user.email} onClick={handleSignOut} style={{gap:6}}>
                {user.photoURL ? <img src={user.photoURL} style={{width:20,height:20,borderRadius:"50%",objectFit:"cover"}} alt=""/> : "👤"}
                Sign out
              </button>
            </>
          )}
        </div>

        <div className="content">
          {view === "library" && <LibraryView albums={filtered} filterTier={filterTier} setFilterTier={setFilterTier} sortBy={sortBy} setSortBy={setSortBy} onSelect={a => { if (!compareMode) setSelectedAlbum(a); }} onAdd={() => setShowAddModal(true)} compareMode={compareMode} compareIds={compareIds} toggleCompare={toggleCompare} gridStyle={gridStyle} settings={settings} />}
          {view === "rankings" && <RankingsView ranked={ranked} onSelect={a => { setSelectedAlbum(a); setView("library"); }} settings={settings} />}
          {view === "artists" && <ArtistView stats={artistStats} onSelect={artist => { setSearch(artist); setView("library"); }} settings={settings} />}
          {view === "stats" && <StatsView albums={albums} globalStats={globalStats} ranked={ranked} settings={settings} />}
          {view === "log" && <LogView log={log} albums={albums} onClear={() => { setLog([]); showToast("Log cleared", "🗑"); }} />}
          {view === "settings" && <SettingsView settings={settings} onSave={handleSettingsSave} albums={albums} log={log} onExport={handleExport} onImport={handleImport} onClearLog={() => { setLog([]); showToast("Log cleared", "🗑"); }} onSignOut={handleSignOut} user={user} showToast={showToast} />}
        </div>
      </div>

      {selectedAlbum && <AlbumDetail album={selectedAlbum} onClose={() => setSelectedAlbum(null)} onSave={saveAlbum} onDelete={deleteAlbum} onEdit={() => { setEditingAlbum(selectedAlbum); setSelectedAlbum(null); }} settings={settings} />}
      {(showAddModal || editingAlbum) && <AlbumModal initial={editingAlbum} onClose={() => { setShowAddModal(false); setEditingAlbum(null); }} onSave={a => { saveAlbum(a, [{ type: editingAlbum ? "edit" : "add", albumTitle: a.title, albumArtist: a.artist }]); setShowAddModal(false); setEditingAlbum(null); }} settings={settings} />}

      {compareMode && compareIds.length === 2 && !showCompare && (
        <div className="compare-bar">
          {compareAlbums.map(a => (
            <div key={a.id} className="compare-bar-slot">
              <div className="compare-bar-cover">{a.cover ? <img src={a.cover} alt="" /> : "🎵"}</div>
              <div>
                <div className="compare-bar-title">{a.title}</div>
                <div style={{fontSize:11,color:"#5a5a70"}}>{calcAlbumAvg(a.songs) != null ? calcAlbumAvg(a.songs).toFixed(2) : "—"}</div>
              </div>
            </div>
          ))}
          <span className="compare-vs">VS</span>
          <button className="btn btn-primary btn-sm" onClick={() => setShowCompare(true)}>Compare →</button>
          <button className="btn btn-ghost btn-sm" onClick={() => setCompareIds([])}>✕</button>
        </div>
      )}
      {showCompare && compareAlbums.length === 2 && (
        <div className="detail-overlay" onClick={e => e.target === e.currentTarget && setShowCompare(false)}>
          <ComparePanel albums={compareAlbums} onClose={() => setShowCompare(false)} settings={settings} />
        </div>
      )}
      {undoData && (
        <div className="undo-bar">
          <span>Album deleted</span>
          <button className="btn btn-ghost btn-sm" onClick={undoDelete}>↩️ Undo</button>
          <button className="btn btn-ghost btn-sm" onClick={() => { clearTimeout(undoData.timeout); setUndoData(null); }}>✕</button>
        </div>
      )}
      {toast && <div className="toast"><span>{toast.icon}</span>{toast.msg}</div>}
    </div>
  );
}

// ── Settings View ─────────────────────────────────────────────────────────
const ACCENT_COLORS = [
  { name: "Amber",   hex: "#F5A623" },
  { name: "Blue",    hex: "#4FC3F7" },
  { name: "Green",   hex: "#81C784" },
  { name: "Purple",  hex: "#CE93D8" },
  { name: "Red",     hex: "#FF6B6B" },
  { name: "Pink",    hex: "#F48FB1" },
  { name: "Teal",    hex: "#4DB6AC" },
  { name: "Orange",  hex: "#FF8A65" },
  { name: "Lime",    hex: "#AED581" },
  { name: "White",   hex: "#E8E8F0" },
];

function Toggle({ checked, onChange }) {
  return (
    <div
      className="toggle"
      role="switch"
      aria-checked={checked}
      tabIndex={0}
      onClick={() => onChange(!checked)}
      onKeyDown={e => { if (e.key === " " || e.key === "Enter") { e.preventDefault(); onChange(!checked); } }}
    >
      <input type="checkbox" checked={checked} readOnly tabIndex={-1} />
      <div className="toggle-track"/>
      <div className="toggle-thumb"/>
    </div>
  );
}

function SettingsView({ settings, onSave, albums, log, onExport, onImport, onClearLog, onSignOut, user, showToast }) {
  const [local, setLocal] = useState(() => JSON.parse(JSON.stringify(settings)));
  const [activeTab, setActiveTab] = useState("appearance");
  const [dirty, setDirty] = useState(false);

  function set(key, val) { setLocal(prev => ({ ...prev, [key]: val })); setDirty(true); }
  function setNested(key, subKey, val) { setLocal(prev => ({ ...prev, [key]: { ...prev[key], [subKey]: val } })); setDirty(true); }

  function handleSave() { onSave(local); setDirty(false); }
  function handleReset() { const d = { ...DEFAULT_SETTINGS }; setLocal(d); setDirty(true); }

  const tabs = [
    { id: "appearance", icon: "🎨", label: "Appearance" },
    { id: "rating",     icon: "⭐", label: "Rating" },
    { id: "tiers",      icon: "🏅", label: "Tiers" },
    { id: "library",    icon: "📚", label: "Library" },
    { id: "cards",      icon: "🃏", label: "Cards" },
    { id: "data",       icon: "💾", label: "Data & Account" },
  ];

  const tierColors = { S:"#FF6B6B", A:"#F5A623", B:"#4FC3F7", C:"#81C784", D:"#CE93D8" };

  return (
    <div className="settings-layout">
      <div className="settings-sidebar">
        {tabs.map(t => (
          <button key={t.id} className={"settings-tab" + (activeTab === t.id ? " active" : "")} onClick={() => setActiveTab(t.id)}>
            <span className="stab-icon">{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>

      <div className="settings-body">

        {/* ── APPEARANCE ── */}
        {activeTab === "appearance" && (
          <>
            <div className="settings-section">
              <div className="settings-section-title">Appearance</div>
              <div className="settings-section-desc">Customize how Waxify looks and feels.</div>

              <div className="settings-row">
                <div className="settings-row-info">
                  <div className="settings-row-label">Accent color</div>
                  <div className="settings-row-sub">Used for highlights, active states, and ratings.</div>
                </div>
                <div className="settings-row-control">
                  <div className="color-swatches">
                    {ACCENT_COLORS.map(c => (
                      <div key={c.hex} className={"color-swatch" + (local.accentColor === c.hex ? " active" : "")}
                        style={{background:c.hex}} title={c.name}
                        onClick={() => set("accentColor", c.hex)} />
                    ))}
                    <input type="color" value={local.accentColor} onChange={e => set("accentColor", e.target.value)}
                      style={{width:28,height:28,borderRadius:"50%",padding:0,border:"2px solid #38384a",background:"none",cursor:"pointer"}}
                      title="Custom color" />
                  </div>
                </div>
              </div>

              <div className="settings-row">
                <div className="settings-row-info">
                  <div className="settings-row-label">Card density</div>
                  <div className="settings-row-sub">Controls the padding and spacing of album cards across the library.</div>
                </div>
                <div className="settings-row-control">
                  <div className="density-options">
                    {[
                      { id: "compact", label: "Compact", gap: 4, heights: [12,8,12] },
                      { id: "normal",  label: "Normal",  gap: 8, heights: [16,10,16] },
                      { id: "comfortable", label: "Cozy", gap: 12, heights: [20,12,20] },
                    ].map(opt => (
                      <div key={opt.id} className={"density-option" + (local.cardDensity === opt.id ? " active" : "")} onClick={() => set("cardDensity", opt.id)}>
                        <div style={{display:"flex",flexDirection:"column",gap:opt.gap+"px",alignItems:"center"}}>
                          {opt.heights.map((h,i) => <div key={i} style={{height:h+"px",background:local.cardDensity===opt.id?"var(--accent)":"#38384a",borderRadius:3,width:48,opacity:i===1?.6:1,transition:"all .2s"}}/>)}
                        </div>
                        <div className="density-option-label">{opt.label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="settings-row">
                <div className="settings-row-info">
                  <div className="settings-row-label">Font size</div>
                  <div className="settings-row-sub">Scale the text size across the whole app.</div>
                </div>
                <div className="settings-row-control" style={{display:"flex",flexDirection:"column",gap:8,alignItems:"flex-end"}}>
                  <div style={{display:"flex",gap:8}}>
                    {[{v:0.85,l:"Small"},{v:1,l:"Default"},{v:1.15,l:"Large"}].map(opt => (
                      <button key={opt.v} onClick={() => set("fontScale", opt.v)}
                        style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:"1px solid "+(local.fontScale===opt.v?"var(--accent)":"#2a2a35"),background:local.fontScale===opt.v?"var(--accent-dim)":"#1C1C22",color:local.fontScale===opt.v?"var(--accent)":"#9090A8",cursor:"pointer",transition:"all .15s"}}>
                        {opt.l}
                      </button>
                    ))}
                  </div>
                  <div className="font-scale-preview" style={{fontSize:`calc(14px * ${local.fontScale})`}}>
                    Preview text — your albums will look like this.
                  </div>
                </div>
              </div>

              <div className="settings-row">
                <div className="settings-row-info">
                  <div className="settings-row-label">Score display style</div>
                  <div className="settings-row-sub">How album scores appear on cards.</div>
                </div>
                <div className="settings-row-control">
                  <div style={{display:"flex",gap:8}}>
                    {[
                      { id: "ring",  label: "Ring",  preview: <ScoreRing score={8.4} size={36} style="ring" /> },
                      { id: "badge", label: "Badge", preview: <ScoreRing score={8.4} size={36} style="badge" /> },
                      { id: "text",  label: "Text",  preview: <ScoreRing score={8.4} size={36} style="text" /> },
                    ].map(opt => (
                      <button key={opt.id} onClick={() => set("scoreRingStyle", opt.id)}
                        style={{padding:"8px 12px",borderRadius:10,border:"1px solid "+(local.scoreRingStyle===opt.id?"var(--accent)":"#2a2a35"),background:local.scoreRingStyle===opt.id?"var(--accent-dim)":"#1C1C22",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all .15s"}}>
                        {opt.preview}
                        <span style={{fontSize:11,color:local.scoreRingStyle===opt.id?"var(--accent)":"#5a5a70",fontWeight:600}}>{opt.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <div className="settings-row">
                <div className="settings-row-info">
                  <div className="settings-row-label">Animations</div>
                  <div className="settings-row-sub">Card hover effects and transitions.</div>
                </div>
                <div className="settings-row-control"><Toggle checked={local.animationsEnabled} onChange={v => set("animationsEnabled", v)} /></div>
              </div>
            </div>
          </>
        )}

        {/* ── RATING ── */}
        {activeTab === "rating" && (
          <div className="settings-section">
            <div className="settings-section-title">Rating</div>
            <div className="settings-section-desc">Control how you rate and display scores.</div>

            <div className="settings-row">
              <div className="settings-row-info">
                <div className="settings-row-label">Rating step size</div>
                <div className="settings-row-sub">Precision of the rating slider in the track editor.</div>
              </div>
              <div className="settings-row-control">
                <select className="settings-select" value={local.ratingStep} onChange={e => set("ratingStep", Number(e.target.value))}>
                  <option value={0.1}>0.1 — Fine</option>
                  <option value={0.5}>0.5 — Half</option>
                  <option value={1}>1.0 — Whole</option>
                </select>
              </div>
            </div>

            <div className="settings-row">
              <div className="settings-row-info">
                <div className="settings-row-label">Show tier badge on cards</div>
                <div className="settings-row-sub">S / A / B / C / D / F label overlaid on album art.</div>
              </div>
              <div className="settings-row-control"><Toggle checked={local.showTierBadge} onChange={v => set("showTierBadge", v)} /></div>
            </div>

            <div className="settings-row">
              <div className="settings-row-info">
                <div className="settings-row-label">Auto-save on close</div>
                <div className="settings-row-sub">Save rating changes automatically when you close an album — no "Save" button needed.</div>
              </div>
              <div className="settings-row-control"><Toggle checked={local.autoSaveOnClose} onChange={v => set("autoSaveOnClose", v)} /></div>
            </div>
          </div>
        )}

        {/* ── TIERS ── */}
        {activeTab === "tiers" && (
          <div className="settings-section">
            <div className="settings-section-title">Tier thresholds</div>
            <div className="settings-section-desc">Set the minimum score needed to reach each tier. F tier is everything below D.</div>
            <div style={{background:"#1C1C22",border:"1px solid #2a2a35",borderRadius:12,padding:"16px 20px",marginBottom:16}}>
              {["S","A","B","C","D"].map(tier => (
                <div key={tier} className="tier-threshold-row">
                  <div className="tier-threshold-letter" style={{color:tierColors[tier]}}>{tier}</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <input type="range" min="0" max="10" step="0.1"
                      value={local.tierThresholds[tier]}
                      onChange={e => setNested("tierThresholds", tier, Number(e.target.value))}
                      style={{flex:1,height:4,accentColor:"var(--accent)"}} />
                    <input type="number" className="tier-threshold-input" min="0" max="10" step="0.1"
                      value={local.tierThresholds[tier]}
                      onChange={e => setNested("tierThresholds", tier, Math.min(10, Math.max(0, Number(e.target.value))))} />
                  </div>
                  <div className="tier-threshold-desc">≥ {local.tierThresholds[tier].toFixed(1)}</div>
                </div>
              ))}
            </div>
