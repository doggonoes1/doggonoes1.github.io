function StatsView({ albums, globalStats, ranked }) {
  const tierCounts = useMemo(() => {
    const c={S:0,A:0,B:0,C:0,D:0,F:0};
    albums.forEach(a => { const t=getTier(calcAlbumAvg(a.songs)); if(t) c[t.label]++; });
    return c;
  }, [albums]);
  const max = Math.max(...Object.values(tierCounts),1);
  const tierColors = {S:"#FF6B6B",A:"#F5A623",B:"#4FC3F7",C:"#81C784",D:"#CE93D8",F:"#90A4AE"};

  const ratingDist = useMemo(() => {
    const b=Array(10).fill(0);
    albums.forEach(a=>a.songs.forEach(s=>{if(s.rating!==null&&s.rating!=="")b[Math.min(9,Math.floor(Number(s.rating)))]++;}));
    return b;
  }, [albums]);
  const maxBucket = Math.max(...ratingDist,1);

  const allRatedSongs = useMemo(() => {
    const songs=[];
    albums.forEach(a=>a.songs.forEach((s,i)=>{if(s.rating!==null&&s.rating!=="")songs.push({...s,albumTitle:a.title,albumArtist:a.artist,trackNum:i+1});}));
    return songs.sort((a,b)=>Number(b.rating)-Number(a.rating));
  }, [albums]);

  const stdDev = useMemo(() => {
    const avgs=albums.map(a=>calcAlbumAvg(a.songs)).filter(v=>v!==null);
    if(avgs.length<2) return null;
    const mean=avgs.reduce((s,v)=>s+v,0)/avgs.length;
    return Math.sqrt(avgs.reduce((s,v)=>s+(v-mean)*(v-mean),0)/avgs.length);
  }, [albums]);

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-value">{globalStats.total}</div><div className="stat-label">Total albums</div></div>
        <div className="stat-card"><div className="stat-value">{globalStats.rated}</div><div className="stat-label">Rated albums</div></div>
        <div className="stat-card"><div className="stat-value">{globalStats.avgScore!==null?globalStats.avgScore.toFixed(2):"—"}</div><div className="stat-label">Overall average</div></div>
        <div className="stat-card"><div className="stat-value">{globalStats.totalSongs}</div><div className="stat-label">Total songs</div></div>
        <div className="stat-card"><div className="stat-value">{globalStats.ratedSongs}</div><div className="stat-label">Rated songs</div></div>
        {stdDev!==null && <div className="stat-card"><div className="stat-value">{stdDev.toFixed(2)}</div><div className="stat-label">Rating std deviation</div></div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:28}}>
        <div style={{background:"#1C1C22",border:"1px solid #2a2a35",borderRadius:14,padding:20}}>
          <div className="section-label" style={{marginBottom:16}}>Tier breakdown</div>
          {Object.entries(tierCounts).map(([tier,count]) => (
            <div key={tier} className="tier-row">
              <div className="tier-letter" style={{color:tierColors[tier]}}>{tier}</div>
              <div className="tier-bar-wrap"><div className="tier-bar-fill" style={{width:(count/max*100)+"%",background:tierColors[tier]}}/></div>
              <div className="tier-count">{count}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#1C1C22",border:"1px solid #2a2a35",borderRadius:14,padding:20}}>
          <div className="section-label" style={{marginBottom:16}}>Song rating distribution</div>
          <div style={{display:"flex",gap:4,alignItems:"flex-end",height:120}}>
            {ratingDist.map((count,i) => (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:"100%",background:"#F5A623",borderRadius:"3px 3px 0 0",height:(count/maxBucket*100)+"px",minHeight:count>0?4:0,transition:"height .4s ease",opacity:.7+(i/9)*.3}}/>
                <span style={{fontSize:10,color:"#5a5a70"}}>{i}s</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      {allRatedSongs.length>0 && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:28}}>
          <div style={{background:"#1C1C22",border:"1px solid #2a2a35",borderRadius:14,padding:20}}>
            <div className="section-label" style={{marginBottom:12}}>Top 5 songs globally</div>
            {allRatedSongs.slice(0,5).map((s,i) => (
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #2a2a35"}}>
                <span style={{fontSize:12,color:"#5a5a70",width:16}}>{i+1}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title||("Track "+s.trackNum)}</div>
                  <div style={{fontSize:11,color:"#5a5a70"}}>{s.albumTitle}</div>
                </div>
                <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:14,fontWeight:700,color:ratingColor(s.rating)}}>{Number(s.rating).toFixed(1)}</span>
              </div>
            ))}
          </div>
          <div style={{background:"#1C1C22",border:"1px solid #2a2a35",borderRadius:14,padding:20}}>
            <div className="section-label" style={{marginBottom:12}}>Bottom 5 songs globally</div>
            {allRatedSongs.slice(-5).reverse().map((s,i) => (
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #2a2a35"}}>
                <span style={{fontSize:12,color:"#5a5a70",width:16}}>{i+1}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title||("Track "+s.trackNum)}</div>
                  <div style={{fontSize:11,color:"#5a5a70"}}>{s.albumTitle}</div>
                </div>
                <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:14,fontWeight:700,color:ratingColor(s.rating)}}>{Number(s.rating).toFixed(1)}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function LogView({ log, albums, onClear }) {
  const [filter,setFilter] = useState("all");
  const filtered = filter==="all" ? log : log.filter(e=>e.type===filter);
  function getLogColor(t) { if(t==="rating") return "#F5A623"; if(t==="add") return "#81C784"; if(t==="edit") return "#4FC3F7"; if(t==="delete") return "#FF6B6B"; return "#5a5a70"; }
  function getLogIcon(t) { if(t==="rating") return "⭐"; if(t==="add") return "➕"; if(t==="edit") return "✏️"; if(t==="delete") return "🗑"; return "•"; }
  if(!log.length) return <div className="empty-state"><div className="big-icon">📋</div><h2>No edits logged yet</h2><p>All song rating changes, album additions, and edits will appear here.</p></div>;
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24,flexWrap:"wrap"}}>
        {["all","rating","add","edit","delete"].map(t => (
          <button key={t} className={"filter-chip"+(filter===t?" active":"")} onClick={() => setFilter(t)}>
            {t==="all"?"All":t==="rating"?"⭐ Ratings":t==="add"?"➕ Added":t==="edit"?"✏️ Edits":"🗑 Deleted"}
          </button>
        ))}
        <div style={{flex:1}}/>
        <span style={{fontSize:12,color:"#5a5a70"}}>{filtered.length} entries</span>
        <button className="btn btn-danger btn-sm" onClick={() => { if(window.confirm("Clear all log entries?")) onClear(); }}>Clear log</button>
      </div>
      {filtered.length===0 ? <div className="empty-state" style={{padding:"40px 24px"}}><p>No {filter} entries yet.</p></div> :
        filtered.map(entry => (
          <div key={entry.id} className="log-entry">
            <div className="log-dot" style={{background:getLogColor(entry.type)}}/>
            <div className="log-content">
              <div className="log-title">
                {getLogIcon(entry.type)} {entry.albumTitle||"Unknown Album"}
                {entry.albumArtist && <span style={{color:"#5a5a70",fontWeight:400}}> — {entry.albumArtist}</span>}
              </div>
              <div className="log-sub">
                {entry.type==="rating" && (
                  <span className="log-diff">
                    {entry.songTitle && <span style={{color:"#9090A8"}}>{entry.songTitle}:</span>}
                    <span style={{color:ratingColor(entry.prevRating)}}>{entry.prevRating!==null&&entry.prevRating!==undefined?Number(entry.prevRating).toFixed(1):"unrated"}</span>
                    <span className="log-arrow">→</span>
                    <span style={{color:ratingColor(entry.newRating)}}>{entry.newRating!==null&&entry.newRating!==undefined?Number(entry.newRating).toFixed(1):"cleared"}</span>
                    {entry.prevRating!==null&&entry.newRating!==null && <span style={{fontSize:11,color:Number(entry.newRating)>Number(entry.prevRating)?"#81C784":"#FF6B6B"}}>({Number(entry.newRating)>Number(entry.prevRating)?"+":""}{(Number(entry.newRating)-Number(entry.prevRating)).toFixed(1)})</span>}
                  </span>
                )}
                {entry.type==="add" && <span style={{color:"#81C784"}}>Album added to library</span>}
                {entry.type==="edit" && <span style={{color:"#4FC3F7"}}>Album info updated</span>}
                {entry.type==="delete" && <span style={{color:"#FF6B6B"}}>Album removed from library</span>}
              </div>
            </div>
            <div className="log-time">{formatDateTime(entry.ts)}</div>
          </div>
        ))
      }
    </div>
  );
}

function ComparePanel({ albums, onClose }) {
  const [a,b] = albums.map(al=>({...al,avg:calcAlbumAvg(al.songs)}));
  const aTier=getTier(a.avg); const bTier=getTier(b.avg);
  const maxSongs=Math.max(a.songs.length,b.songs.length);
  function winner(va,vb) { if(va===null&&vb===null) return "tie"; if(va===null) return "b"; if(vb===null) return "a"; if(Number(va)>Number(vb)) return "a"; if(Number(vb)>Number(va)) return "b"; return "tie"; }
  const aRated=a.songs.filter(s=>s.rating!==null&&s.rating!=="").length;
  const bRated=b.songs.filter(s=>s.rating!==null&&s.rating!=="").length;
  const aFav=getDisplayFav(a); const bFav=getDisplayFav(b);
  const aMax=a.songs.reduce((m,s)=>s.rating!==null&&Number(s.rating)>m?Number(s.rating):m,0);
  const bMax=b.songs.reduce((m,s)=>s.rating!==null&&Number(s.rating)>m?Number(s.rating):m,0);
  const aMin=a.songs.filter(s=>s.rating!==null&&s.rating!=="").reduce((m,s)=>Number(s.rating)<m?Number(s.rating):m,11);
  const bMin=b.songs.filter(s=>s.rating!==null&&s.rating!=="").reduce((m,s)=>Number(s.rating)<m?Number(s.rating):m,11);
  const rows=[
    {label:"Score",va:a.avg!=null?a.avg.toFixed(2):"—",vb:b.avg!=null?b.avg.toFixed(2):"—",w:winner(a.avg,b.avg)},
    {label:"Tier",va:aTier?aTier.label:"—",vb:bTier?bTier.label:"—",w:"tie",colorA:aTier&&aTier.color,colorB:bTier&&bTier.color},
    {label:"Tracks",va:a.songs.length,vb:b.songs.length,w:"tie"},
    {label:"Rated",va:aRated+"/"+a.songs.length,vb:bRated+"/"+b.songs.length,w:"tie"},
    {label:"Year",va:a.year||"—",vb:b.year||"—",w:"tie"},
    {label:"Genre",va:a.genre||"—",vb:b.genre||"—",w:"tie"},
    {label:"Best track",va:aMax>0?aMax.toFixed(1):"—",vb:bMax>0?bMax.toFixed(1):"—",w:winner(aMax>0?aMax:null,bMax>0?bMax:null)},
    {label:"Worst track",va:aMin<11?aMin.toFixed(1):"—",vb:bMin<11?bMin.toFixed(1):"—",w:winner(bMin<11?bMin:null,aMin<11?aMin:null)},
    {label:"Fav song",va:aFav?(aFav.title||"—"):"—",vb:bFav?(bFav.title||"—"):"—",w:"tie"},
  ];
  return (
    <div className="compare-panel">
      <div className="compare-header">
        <div className="compare-album-header compare-col">
          <div className="compare-album-cover">{a.cover?<img src={a.cover} alt=""/>:"🎵"}</div>
          <div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:16,fontWeight:700}}>{a.title}</div><div style={{fontSize:13,color:"#9090A8"}}>{a.artist}</div></div>
          <ScoreRing score={a.avg} size={56}/>
        </div>
        <div style={{textAlign:"center",fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:700,color:"#5a5a70",padding:"0 8px"}}>VS</div>
        <div className="compare-album-header compare-col">
          <div className="compare-album-cover">{b.cover?<img src={b.cover} alt=""/>:"🎵"}</div>
          <div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:16,fontWeight:700}}>{b.title}</div><div style={{fontSize:13,color:"#9090A8"}}>{b.artist}</div></div>
          <ScoreRing score={b.avg} size={56}/>
        </div>
        <button className="btn btn-ghost btn-sm" style={{alignSelf:"flex-start",marginLeft:8}} onClick={onClose}>✕</button>
      </div>
      <div className="compare-body">
        <div style={{padding:"16px 24px 8px"}}><div className="section-label">Head to head</div></div>
        {rows.map(row => (
          <div key={row.label} className="compare-row">
            <div className={"compare-cell-left"+(row.w==="a"?" compare-winner":"")} style={row.colorA?{color:row.colorA}:{}}>{row.w==="a"&&"🏆 "}{row.va}</div>
            <div className="compare-cell-mid">{row.label}</div>
            <div className={"compare-cell-right"+(row.w==="b"?" compare-winner":"")} style={row.colorB?{color:row.colorB}:{}}>{row.w==="b"&&"🏆 "}{row.vb}</div>
          </div>
        ))}
        {maxSongs>0 && (
          <>
            <div style={{padding:"20px 24px 8px"}}><div className="section-label">Track by track</div></div>
            <div className="compare-song-row" style={{fontSize:11,color:"#5a5a70",fontWeight:600,letterSpacing:".5px"}}>
              <div style={{textAlign:"right"}}>{a.title}</div>
              <div style={{textAlign:"center"}}>#</div>
              <div style={{textAlign:"center"}}>A</div>
              <div style={{textAlign:"center"}}>B</div>
              <div>{b.title}</div>
            </div>
            {Array.from({length:maxSongs},(_,i) => {
              const sa=a.songs[i]; const sb=b.songs[i];
              const ra=sa&&sa.rating!==null&&sa.rating!==""?Number(sa.rating):null;
              const rb=sb&&sb.rating!==null&&sb.rating!==""?Number(sb.rating):null;
              const w=winner(ra,rb);
              return (
                <div key={i} className="compare-song-row">
                  <div className={"compare-song-left"+(w==="a"?" compare-winner":"")}>{sa?(sa.title||("Track "+(i+1))):"—"}</div>
                  <div style={{textAlign:"center",fontSize:11,color:"#5a5a70"}}>{i+1}</div>
                  <div className="compare-song-score" style={{color:ratingColor(ra)}}>{ra!==null?ra.toFixed(1):"—"}</div>
                  <div className="compare-song-score" style={{color:ratingColor(rb)}}>{rb!==null?rb.toFixed(1):"—"}</div>
                  <div className={"compare-song-right"+(w==="b"?" compare-winner":"")}>{sb?(sb.title||("Track "+(i+1))):"—"}</div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

// ── Settings helpers ──────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  accent: "amber",
  fontScale: "md",
  compact: false,
  radius: "soft",
  density: "normal",
  hideSidebarStats: false,
  showRankBadge: true,
  showFavSong: true,
  showDateAdded: true,
  showMetaTags: true,
  animatedCards: true,
  logLimit: 500,
  defaultSort: "dateAdded",
  defaultTierFilter: "all",
  confirmDelete: true,
  autoExportReminder: false,
  tiers: [
    { label:"S", min:9.5, color:"#FF6B6B", bg:"rgba(255,107,107,0.15)" },
    { label:"A", min:8.5, color:"#F5A623", bg:"rgba(245,166,35,0.15)" },
    { label:"B", min:7.5, color:"#4FC3F7", bg:"rgba(79,195,247,0.15)" },
    { label:"C", min:6.0, color:"#81C784", bg:"rgba(129,199,132,0.15)" },
    { label:"D", min:4.0, color:"#CE93D8", bg:"rgba(206,147,216,0.15)" },
    { label:"F", min:0,   color:"#90A4AE", bg:"rgba(144,164,174,0.15)" },
  ],
};

function loadSettings() {
  try {
    const raw = localStorage.getItem("waxify_settings");
    if (!raw) return { ...DEFAULT_SETTINGS, tiers: DEFAULT_SETTINGS.tiers.map(t=>({...t})) };
    const saved = JSON.parse(raw);
    return { ...DEFAULT_SETTINGS, ...saved, tiers: saved.tiers || DEFAULT_SETTINGS.tiers.map(t=>({...t})) };
  } catch { return { ...DEFAULT_SETTINGS, tiers: DEFAULT_SETTINGS.tiers.map(t=>({...t})) }; }
}
function saveSettings(s) {
  try { localStorage.setItem("waxify_settings", JSON.stringify(s)); } catch {}
}
function applySettings(s) {
  const b = document.body;
  b.setAttribute("data-accent", s.accent || "amber");
  b.setAttribute("data-fontscale", s.fontScale || "md");
  b.setAttribute("data-compact", s.compact ? "true" : "false");
  b.setAttribute("data-radius", s.radius || "soft");
  b.setAttribute("data-density", s.density || "normal");
  b.setAttribute("data-hidestats", s.hideSidebarStats ? "true" : "false");
  // sync CSS var for accent so buttons pick it up via inline styles
  const accentMap = { amber:"#F5A623", blue:"#4FC3F7", green:"#81C784", purple:"#CE93D8", red:"#FF6B6B" };
  document.documentElement.style.setProperty("--amber", accentMap[s.accent] || "#F5A623");
}

// Expose tiers globally so getTier() uses current settings
let _activeTiers = loadSettings().tiers;
function getTierFromSettings(avg) {
  if (avg === null || avg === undefined) return null;
  for (const t of _activeTiers) {
    if (avg >= t.min) return t;
  }
  return _activeTiers[_activeTiers.length - 1];
}

// Override global getTier to use live settings
function getTier(avg) { return getTierFromSettings(avg); }

// ── SettingsModal ─────────────────────────────────────────────────────────
function SettingsModal({ settings, onSave, onClose }) {
  const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(settings)));
  const [tab, setTab] = useState("appearance");

  function set(key, val) { setDraft(d => ({ ...d, [key]: val })); }
  function setTierField(idx, field, val) {
    setDraft(d => {
      const tiers = d.tiers.map((t,i) => i===idx ? {...t,[field]:val} : t);
      return {...d, tiers};
    });
  }

  const accentColors = [
    { key:"amber", color:"#F5A623", label:"Amber" },
    { key:"blue",  color:"#4FC3F7", label:"Blue" },
    { key:"green", color:"#81C784", label:"Green" },
    { key:"purple",color:"#CE93D8", label:"Purple" },
    { key:"red",   color:"#FF6B6B", label:"Red" },
  ];

  const tabs = [
    { id:"appearance", icon:"🎨", label:"Appearance" },
    { id:"library",    icon:"📚", label:"Library" },
    { id:"tiers",      icon:"🏅", label:"Tier System" },
    { id:"behaviour",  icon:"⚙️",  label:"Behaviour" },
    { id:"account",    icon:"👤", label:"Account" },
  ];

  function Toggle({ k }) {
    return (
      <label className="s-toggle">
        <input type="checkbox" checked={!!draft[k]} onChange={e => set(k, e.target.checked)} />
        <div className="s-toggle-track"/>
        <div className="s-toggle-thumb"/>
      </label>
    );
  }

  return (
    <div className="settings-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="settings-panel">
        <div className="settings-header">
          <div className="settings-title">⚙️ Settings</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        <div className="settings-body">
          {/* Sidebar tabs */}
          <div className="settings-sidebar">
            {tabs.map(t => (
              <button key={t.id} className={"settings-tab"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>
                <span className="s-icon">{t.icon}</span>{t.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div className="settings-content">

            {/* ── APPEARANCE ── */}
            {tab==="appearance" && <>
              <div className="settings-section">
                <div className="settings-section-title">Accent Color</div>
                <div className="settings-row" style={{borderBottom:"none"}}>
                  <div className="settings-row-label">
                    <strong>Theme color</strong>
                    <span>Used for active elements, buttons, and highlights</span>
                  </div>
                  <div className="settings-row-ctrl">
                    <div className="s-swatch-row">
                      {accentColors.map(a => (
                        <div key={a.key} title={a.label} className={"s-swatch"+(draft.accent===a.key?" active":"")}
                          style={{background:a.color}} onClick={()=>set("accent",a.key)}/>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              <div className="settings-section">
                <div className="settings-section-title">Typography & Scale</div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Font size</strong><span>Base font scale for the UI</span></div>
                  <div className="settings-row-ctrl">
                    <select className="s-select" value={draft.fontScale} onChange={e=>set("fontScale",e.target.value)}>
                      <option value="sm">Small</option>
                      <option value="md">Medium (default)</option>
                      <option value="lg">Large</option>
                    </select>
                  </div>
                </div>
              </div>

              <div className="settings-section">
                <div className="settings-section-title">Layout</div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Card corners</strong><span>Border radius style for cards and panels</span></div>
                  <div className="settings-row-ctrl">
                    <select className="s-select" value={draft.radius} onChange={e=>set("radius",e.target.value)}>
                      <option value="sharp">Sharp</option>
                      <option value="soft">Soft (default)</option>
                      <option value="round">Round</option>
                    </select>
                  </div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Card density</strong><span>How many album cards appear per row</span></div>
                  <div className="settings-row-ctrl">
                    <select className="s-select" value={draft.density} onChange={e=>set("density",e.target.value)}>
                      <option value="compact">Compact (more columns)</option>
                      <option value="normal">Normal (default)</option>
                      <option value="cozy">Cozy (fewer columns)</option>
                    </select>
                  </div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Compact mode</strong><span>Reduce padding and spacing throughout</span></div>
                  <div className="settings-row-ctrl"><Toggle k="compact"/></div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Hide sidebar stats</strong><span>Hide album/song counts in the sidebar</span></div>
                  <div className="settings-row-ctrl"><Toggle k="hideSidebarStats"/></div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Animated cards</strong><span>Hover lift animation on album cards</span></div>
                  <div className="settings-row-ctrl"><Toggle k="animatedCards"/></div>
                </div>
              </div>
            </>}

            {/* ── LIBRARY ── */}
            {tab==="library" && <>
              <div className="settings-section">
                <div className="settings-section-title">Default View</div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Default sort</strong><span>Sort order when you open the library</span></div>
                  <div className="settings-row-ctrl">
                    <select className="s-select" value={draft.defaultSort} onChange={e=>set("defaultSort",e.target.value)}>
                      <option value="dateAdded">Date added</option>
                      <option value="rating">Rating</option>
                      <option value="title">Title</option>
                      <option value="artist">Artist</option>
                      <option value="year">Year</option>
                    </select>
                  </div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Default tier filter</strong><span>Tier shown when you open the library</span></div>
                  <div className="settings-row-ctrl">
                    <select className="s-select" value={draft.defaultTierFilter} onChange={e=>set("defaultTierFilter",e.target.value)}>
                      <option value="all">All tiers</option>
                      {draft.tiers.map(t=><option key={t.label} value={t.label}>{t.label} tier</option>)}
                    </select>
                  </div>
                </div>
              </div>

              <div className="settings-section">
                <div className="settings-section-title">Album Card Info</div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Show rank badge</strong><span>Display #1, #2… on each card</span></div>
                  <div className="settings-row-ctrl"><Toggle k="showRankBadge"/></div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Show favourite song</strong><span>Show the top-rated track below the card</span></div>
                  <div className="settings-row-ctrl"><Toggle k="showFavSong"/></div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Show date added</strong><span>Display when the album was added</span></div>
                  <div className="settings-row-ctrl"><Toggle k="showDateAdded"/></div>
                </div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Show genre / year tags</strong><span>Show metadata chips on each card</span></div>
                  <div className="settings-row-ctrl"><Toggle k="showMetaTags"/></div>
                </div>
              </div>

              <div className="settings-section">
                <div className="settings-section-title">Edit Log</div>
                <div className="settings-row">
                  <div className="settings-row-label">
                    <strong>Log entry limit</strong>
                    <span>Max log entries loaded from Firestore ({draft.logLimit})</span>
                  </div>
                  <div className="settings-row-ctrl" style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="range" className="s-slider" min={50} max={2000} step={50} value={draft.logLimit}
                      onChange={e=>set("logLimit",Number(e.target.value))}/>
                    <span className="s-badge">{draft.logLimit}</span>
                  </div>
                </div>
              </div>
            </>}

            {/* ── TIERS ── */}
            {tab==="tiers" && <>
              <div className="settings-section">
                <div className="settings-section-title">Tier Thresholds & Colors</div>
                <p style={{fontSize:12,color:"#5a5a70",marginBottom:16,lineHeight:1.6}}>
                  Adjust the minimum score and display color for each tier. Changes apply immediately to your library.
                </p>
                <div style={{display:"grid",gridTemplateColumns:"28px 1fr 100px 100px 80px",gap:8,fontSize:11,fontWeight:600,color:"#5a5a70",marginBottom:6,letterSpacing:.5}}>
                  <div/>
                  <div>LABEL</div>
                  <div>MIN SCORE</div>
                  <div>COLOR</div>
                  <div>PREVIEW</div>
                </div>
                {draft.tiers.map((t,i) => (
                  <div key={t.label} className="tier-editor-row" style={{gridTemplateColumns:"28px 1fr 100px 100px 80px",display:"grid",gap:8,alignItems:"center",padding:"10px 0",borderBottom:"1px solid #1e1e26"}}>
                    <div className="tier-letter-badge" style={{color:t.color}}>{t.label}</div>
                    <input className="s-input" value={t.label} onChange={e=>setTierField(i,"label",e.target.value)} maxLength={4}/>
                    <input className="s-input" type="number" min={0} max={10} step={0.5} value={t.min}
                      onChange={e=>setTierField(i,"min",Number(e.target.value))}/>
                    <input className="s-input" type="color" value={t.color}
                      onChange={e=>setTierField(i,"color",e.target.value)}
                      style={{height:34,padding:"2px 4px",cursor:"pointer"}}/>
                    <div className="tier-preview" style={{color:t.color,background:t.bg||"rgba(128,128,128,0.15)"}}>{t.label}</div>
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" style={{marginTop:14}}
                  onClick={()=>setDraft(d=>({...d,tiers:DEFAULT_SETTINGS.tiers.map(t=>({...t}))}))}>
                  ↺ Reset to defaults
                </button>
              </div>
            </>}

            {/* ── BEHAVIOUR ── */}
            {tab==="behaviour" && <>
              <div className="settings-section">
                <div className="settings-section-title">Confirmations</div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Confirm before deleting</strong><span>Show a confirmation step when removing albums</span></div>
                  <div className="settings-row-ctrl"><Toggle k="confirmDelete"/></div>
                </div>
              </div>
              <div className="settings-section">
                <div className="settings-section-title">Data & Sync</div>
                <div className="settings-row">
                  <div className="settings-row-label"><strong>Export reminder</strong><span>Remind you to export a backup each week</span></div>
                  <div className="settings-row-ctrl"><Toggle k="autoExportReminder"/></div>
                </div>
              </div>
              <div className="settings-section">
                <div className="settings-section-title">Reset</div>
                <div className="settings-row" style={{borderBottom:"none"}}>
                  <div className="settings-row-label"><strong>Reset all settings</strong><span>Restore every setting to its default value</span></div>
                  <div className="settings-row-ctrl">
                    <button className="btn btn-danger btn-sm" onClick={()=>setDraft(JSON.parse(JSON.stringify(DEFAULT_SETTINGS)))}>
                      Reset
                    </button>
                  </div>
                </div>
              </div>
            </>}

            {/* ── ACCOUNT ── */}
            {tab==="account" && <>
              <div className="settings-section">
                <div className="settings-section-title">Session Info</div>
                <div className="settings-row" style={{borderBottom:"none"}}>
                  <div className="settings-row-label"><strong>Settings storage</strong><span>Your preferences are saved locally in this browser</span></div>
                  <div className="settings-row-ctrl">
                    <span style={{fontSize:12,color:"#5a5a70",background:"#1C1C22",padding:"4px 10px",borderRadius:6}}>localStorage</span>
                  </div>
                </div>
              </div>
              <div style={{background:"#1C1C22",border:"1px solid #2a2a35",borderRadius:12,padding:16,fontSize:13,color:"#9090A8",lineHeight:1.6}}>
                ℹ️ Settings are stored in your browser's local storage. They are not synced to Firebase and are device-specific. Your album data and ratings are always saved to your Firestore account and follow you across devices.
              </div>
            </>}

          </div>
        </div>

        <div className="settings-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => onSave(draft)}>Save changes</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root/>);
</script>
</body>
</html>
